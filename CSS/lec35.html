<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More on CSS selectors</title>
    <style>
        .box:first-child{
            background-color: red;
        }
        .box:last-child{
            background-color: green;
        }
    </style>
</head>
<body>
    <div class="boxes">
        <div class="box">Hay I am a box</div>
        <div class="box">Hay I am a box</div>
        <div class="box">Hay I am a box</div>
        <div class="box">Hay I am a box</div>
    </div>
</body>
</body>
</html>
