<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design the layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        header{
            position: sticky;
            top: 0;
        }
        nav{
            background-color: lightcoral;
            height: 40px;
        }
        main{
            background-color: black;
            color: antiquewhite;
            padding: 24px;
        }
        .box-container{
            background-color: aqua;
            margin: 12px 30px;
            padding: 55px 23px;
            text-align: center;
        }
          .box1 {
            background-color: palevioletred;
            height: 340px;
            width: 45%;
            display: inline-block;
            margin: 0 12px;
        }

        .box2 {
            background-color: blue;
            height: 340px;
            width: 45%;
            display: inline-block;
            margin: 0 12px;
        }
        .text-box{
            margin: 10px;
            padding: 30px;
            border: 2px solid white;
            border-radius: 20px;
            text-align: center;
            font-size: large;
        }
        footer{
            background-color: lightslategrey;
            height: 100px;
        }
        .circle{
            height: 32px;
            width: 32px;
        background-color: orange;
    position: fixed;
bottom: 10px;
right:15px;
border-radius: 50px;
        }

    </style>
  </head>
  <body>
    <header>
      <nav class="nav"></nav>
    </header>
    <main>
      <div class="box-container">
        <div class="box1"></div>
        <div class="box2"></div>
      </div>
      <div class="text-box">
        <p>This is Lecture 40 of Sigma Web Development Course</p>
      </div>
      <div class="circle">

      </div>
    </main>
    <footer></footer>
  </body>
</html>
