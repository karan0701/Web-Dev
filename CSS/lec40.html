<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design the layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        header{
            position: sticky;
            top: 0;
        }
        nav{
            background-color: lightcoral;
            height: 40px;
        }
        main{
            background-color: black;
            color: antiquewhite;
            padding: 24px;
        }
        .box-container{
            background-color: aqua;
            margin: 12px 34px;
            padding: 55px 23px;
            text-align: center;
        }
          .box1 {
            background-color: palevioletred;
            height: 70vh;
            width: 45%;
            display: inline-block;
            margin: 0 12px;
        }

        .box2 {
            background-color: blue;
            height: 70vh;
            width: 45%;
            display: inline-block;
            margin: 0 12px;
        }

    </style>
  </head>
  <body>
    <header>
      <nav class="nav"></nav>
    </header>
    <main>
      <div class="box-container">
        <div class="box1"></div>
        <div class="box2"></div>
      </div>
      <div class="text-box">
        <p>this is lecture 40 of sigma web development course</p>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
