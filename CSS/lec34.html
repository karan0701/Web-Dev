<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS float and clear</title>
    <style>
        .cards{border: 2px solid black;
            display: flow-root;

        }
        .card{
            border: 2px solid red;
        }
        img{
            float: left;
        }
    </style>
</head>
<body>
    <div class="cards">
        <img src="https://wallpaperaccess.com/full/170249.jpg" width="300px" alt="">
    <div class="card"><p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Unde sit eum similique. Quos magnam consectetur rerum blanditiis facere totam autem voluptas incidunt non.</p></div>
    <div class="card">card2</div>
    <div class="card">card3</div>
    </div>
    
</body>
</html>
