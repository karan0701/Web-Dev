    <!-- create a multicolor website which can change colors using CSS variables -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
@import url('https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap');
</style>
    <style>
        :root{
            --primary-color: lightseagreen;
            --tertiary-color: lightcoral;
        }
        body{
            background-color: var(--primary-color);
            color: var(--secondary-color);
        font-family: 'Iosevka Charon', sans-serif;
        }
        nav ul{
            margin: 10px;
          padding: 10px;;
            list-style: none;
            display: flex;
            gap: 20px;
            justify-content: right;
        }
        nav ul li{
            background-color: var(--tertiary-color);
            padding: 10px 20px;
            border-radius: 5px;
        }
        nav ul li a {
            color: inherit;
            text-decoration: none;
        }

    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li>
                    <a href="#">Home</a>
                </li>
                <li>
                    <a href="#">About</a>
                </li>
                <li>
                    <a href="#">Services</a>
                </li>
                <li>
                    <a href="#">Contact</a>
                </li>
            </ul>
        </nav>
    </header>

</body>
</html>
